name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-publish:
    name: Build and publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      id-token: write   # required for PyPI trusted publishing (OIDC) — no token stored

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify tag matches pyproject.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match pyproject.toml version $PYPROJECT_VERSION"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"

      - name: Install build tooling
        run: pip install build

      - name: Build distribution
        run: python -m build

      - name: Check distribution metadata
        run: |
          pip install twine
          twine check dist/*

      - name: Verify critical modules are present in the wheel
        # Confirms that new modules added since the last release (e.g.
        # reports/terminal.py, compliance/cis_docker.py) actually ended
        # up inside the built wheel — package-data misconfigurations
        # and import-path changes can cause modules to silently go
        # missing from the distribution while everything still works
        # in the dev source tree.
        run: |
          python3 << 'PYEOF'
          import zipfile, sys
          from pathlib import Path

          whl = next(Path("dist").glob("*.whl"))
          print(f"Checking {whl.name}")
          with zipfile.ZipFile(whl) as z:
              names = z.namelist()

          critical = [
              "secureaudit/compliance/cis_docker.py",
              "secureaudit/compliance/owasp_asvs.py",
              "secureaudit/core/precommit.py",
              "secureaudit/reports/terminal.py",
              "secureaudit/reports/sarif.py",
              "secureaudit/scheduler.py",
          ]
          missing = [f for f in critical if f not in names]
          if missing:
              print(f"MISSING from wheel: {missing}", file=sys.stderr)
              sys.exit(1)
          print(f"OK: {len(names)} files, all {len(critical)} critical modules present")
          PYEOF

      # Trusted publishing (OIDC) — no PYPI_API_TOKEN secret needed.
      # Configure this once at https://pypi.org/manage/project/secureaudit/settings/publishing/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" dist/* \
            --title "${{ github.ref_name }}" \
            --generate-notes
