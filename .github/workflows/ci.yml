name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - name: Run tests
        run: PYTHONPATH=. pytest tests/ -v --tb=short

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install build twine
      - name: Build wheel and sdist
        run: python -m build
      - name: Check package metadata
        run: twine check dist/*

      - name: Install built wheel in a clean venv
        # Retries the install up to 3 times: a real, observed transient
        # failure (three consecutive CI runs failed on a cold venv
        # pulling fastapi/uvicorn's ~15 transitive dependencies, then
        # succeeded on the very next run with no code change at all --
        # confirmed as network flakiness, not a real regression, by
        # reproducing the identical install successfully every time
        # locally). The ::error:: annotations still fire on a final
        # failure after all retries are exhausted, so a genuine
        # packaging regression is still loud and diagnosable, not
        # silently retried away.
        run: |
          python -m venv /tmp/smoke-venv
          for attempt in 1 2 3; do
            if /tmp/smoke-venv/bin/pip install "$(echo dist/*.whl)[dashboard]" > /tmp/pip-install.log 2>&1; then
              exit 0
            fi
            echo "pip install attempt $attempt/3 failed, retrying..."
            sleep 5
          done
          echo "::error::pip install failed after 3 attempts. Last 30 lines of output:"
          tail -n 30 /tmp/pip-install.log | while IFS= read -r line; do
            echo "::error::$line"
          done
          exit 1

      - name: "Integration test: every README-documented command, against the real installed wheel"
        # This is the exact gap that let 5 real bugs (schedule, digest,
        # serve, pre-commit install) ship past 290+ passing unit tests:
        # those tests exercise individual functions/components in
        # isolation, never the actual installed CLI a real user runs.
        # Reproducing every one of those bugs here first (each step below
        # is annotated with which bug it would have caught) before fixing
        # this gap, not assumed sufficient from the list alone.
        run: |
          set -euo pipefail
          SA=/tmp/smoke-venv/bin/secureaudit
          WORK=$(mktemp -d)
          cd "$WORK"

          echo "::group::Set up a realistic test project"
          git init -q
          git config user.email "ci@example.com"
          git config user.name "CI"
          cat > app.py << 'PYEOF'
          API_KEY = "sk-live-abcdef1234567890ABCDEF"
          PYEOF
          cat > Dockerfile << 'DOCKEREOF'
          FROM python:latest
          ADD . /app
          CMD ["python", "app.py"]
          DOCKEREOF
          echo "flask==2.0.1" > requirements.txt
          git add -A
          git commit -q -m "initial"
          echo "::endgroup::"

          echo "::group::init --yes"
          $SA init . --yes --no-baseline
          test -f secureaudit.yml
          echo "::endgroup::"

          echo "::group::scan (plain, --plugins, --output/--json, --fail-below)"
          # The test project is deliberately insecure (real findings are the
          # point, to confirm detection works) -- these are expected to
          # exit 1 on the default 70-threshold, hence || true. --fail-below 0
          # below is the one call actually exercising a passing exit code.
          $SA scan . --plugins secrets,policy || true
          $SA scan . --output report.html --json report.json || true
          test -s report.html
          test -s report.json
          $SA scan . --fail-below 0
          echo "::endgroup::"

          echo "::group::baseline + scan --db (build history for diff)"
          $SA baseline .
          $SA scan . --db audits.db --fail-below 0
          echo 'AWS_SECRET_ACCESS_KEY = "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"' > newfile.py
          $SA scan . --db audits.db --fail-below 0
          echo "::endgroup::"

          echo "::group::diff previous latest -- would have caught nothing here (already covered), confirms it stays correct"
          $SA diff previous latest --db audits.db || true   # exit 1 on regression is expected/correct here
          echo "::endgroup::"

          echo "::group::digest . --db audits.db -- would have caught the 'scan . then digest .' silent-empty-result bug"
          OUTPUT=$($SA digest . --db audits.db)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "score=" || (echo "digest printed no rows for target '.' -- target-resolution regression" && exit 1)
          echo "::endgroup::"

          echo "::group::pre-commit install + a real git commit with a real secret -- would have caught the bare-command/PATH bug"
          $SA pre-commit install
          echo 'GITHUB_TOKEN = "ghp_aBcDeFgHiJkLmNoPqRsTuVwXyZ1234567890"' > leaked.py
          git add leaked.py
          # Deliberately stripped-down PATH, simulating a GUI git client or a
          # fresh shell without this venv activated -- the exact scenario the
          # original bug failed silently in.
          if env -i HOME="$HOME" PATH="/usr/bin:/bin" git commit -m "should be blocked" 2>&1; then
            echo "Commit with a real secret was NOT blocked -- pre-commit hook regression"
            exit 1
          fi
          git reset -q leaked.py
          rm -f leaked.py
          echo "::endgroup::"

          echo "::group::serve -- would have caught the missing-fastapi-check / Rich-markup-bracket bug, and confirms the dashboard actually serves real data"
          $SA serve --db audits.db --port 8123 &
          SERVE_PID=$!
          sleep 2
          curl -sf http://127.0.0.1:8123/ -o /dev/null
          curl -sf http://127.0.0.1:8123/api/runs -o /tmp/runs.json
          python3 -c "import json; data = json.load(open('/tmp/runs.json')); assert len(data) > 0, 'no runs returned'"
          kill $SERVE_PID
          wait $SERVE_PID 2>/dev/null || true
          echo "::endgroup::"

          echo "::group::schedule -- would have caught the dead-import crash-on-every-invocation bug"
          OUTPUT=$(timeout 8 $SA schedule . --cron "0 6 * * 1" --db audits.db 2>&1 || true)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qi "traceback\|ModuleNotFoundError"; then
            echo "schedule crashed -- regression"
            exit 1
          fi
          echo "$OUTPUT" | grep -q "Security Score" || (echo "schedule's immediate run never printed a summary" && exit 1)
          echo "::endgroup::"

          echo "::group::compliance-report (both frameworks)"
          $SA scan . --compliance-report owasp-asvs --fail-below 0
          $SA scan . --compliance-report cis-docker --fail-below 0
          echo "::endgroup::"

          echo "::group::cache status/clear, list-plugins"
          $SA cache status .
          $SA cache clear .
          $SA list-plugins
          echo "::endgroup::"

          echo "All integration checks passed."

  test-action:
    name: Test action.yml end-to-end (incl. SARIF -> Security tab)
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      security-events: write   # required for github/codeql-action/upload-sarif
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Create a small target with a real, findable secret
        run: |
          mkdir -p /tmp/action-test-target
          echo 'API_KEY = "sk-test-1234567890abcdef"' > /tmp/action-test-target/config.py

      - name: "Run the action against itself (local checkout, uses: ./)"
        id: audit
        uses: ./
        with:
          target: /tmp/action-test-target
          plugins: secrets
          fail-below: "0"   # don't fail this CI job on the finding — that's expected, we're testing the upload
          sarif-output: /tmp/action-test.sarif

      - name: Confirm the action's own outputs were actually set
        run: |
          echo "score output: ${{ steps.audit.outputs.score }}"
          echo "grade output: ${{ steps.audit.outputs.grade }}"

      - name: Confirm the SARIF file was actually written and is non-trivial
        run: |
          test -s /tmp/action-test.sarif
          python3 -c "
          import json
          with open('/tmp/action-test.sarif') as f:
              doc = json.load(f)
          results = doc['runs'][0]['results']
          assert len(results) >= 1, 'expected at least one finding for the planted secret'
          print(f'SARIF contains {len(results)} result(s) — OK')
          "
